<div class="space-y-2">
  <label for="{{ field.id_for_label }}" class="block text-sm font-semibold text-slate-700">{{ field.label }}</label>
  {{ field }}
  {% if field.help_text %}<p class="text-xs text-slate-500">{{ field.help_text }}</p>{% endif %}
  {% for error in field.errors %}<p class="text-sm text-rose-600">{{ error }}</p>{% endfor %}
</div>

<article class="group overflow-hidden rounded-3xl border border-emerald-100 bg-white shadow-[0_12px_40px_rgba(16,24,40,0.08)] transition hover:-translate-y-1 hover:shadow-[0_18px_44px_rgba(16,24,40,0.12)]">
    <a href="{{ product.get_absolute_url }}" class="block">
        <div class="aspect-[4/3] bg-gradient-to-br from-emerald-50 to-lime-100">
            {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}" class="h-full w-full object-cover">
            {% else %}
                <div class="flex h-full items-center justify-center px-6 text-center text-emerald-800">
                    <span class="text-sm font-semibold uppercase tracking-[0.2em]">Tefas Pharmacy</span>
                </div>
            {% endif %}
        </div>
    </a>
    <div class="space-y-3 p-5">
        <div class="flex items-start justify-between gap-3">
            <div>
                <a href="{{ product.get_absolute_url }}" class="text-lg font-bold text-slate-950 transition group-hover:text-emerald-800">{{ product.name }}</a>
                <p class="mt-1 text-sm text-slate-500">{{ product.short_description }}</p>
            </div>
            <span class="rounded-full bg-emerald-50 px-3 py-1 text-sm font-semibold text-emerald-800">KSh {{ product.price }}</span>
        </div>
        <form action="{% url 'cart:add' product.id %}" method="post" class="js-add-to-cart flex items-center gap-3">
            {% csrf_token %}
            <input type="hidden" name="quantity" value="1">
            <button type="submit" class="w-full rounded-2xl bg-emerald-700 px-4 py-3 text-sm font-semibold uppercase tracking-[0.12em] text-white transition hover:bg-emerald-800">Add to Cart</button>
        </form>
    </div>
</article>
